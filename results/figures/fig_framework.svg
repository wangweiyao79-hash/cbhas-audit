<svg viewBox="0 0 1240 680" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,1 L8,4.5 L0,8 Z" fill="#222"/>
    </marker>
    <marker id="arrowDash" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,1 L8,4.5 L0,8 Z" fill="#777"/>
    </marker>
  </defs>
  <style>
    .box   { fill:#ffffff; stroke:#222; stroke-width:1.6; }
    .boxF  { fill:#f2f2f2; stroke:#222; stroke-width:1.6; }
    .boxD  { fill:#e2e2e2; stroke:#222; stroke-width:1.6; }
    .lblS  { font-size:12px; fill:#222; }
    .lblXS { font-size:10.5px; fill:#555; }
    .stage { font-size:15px; font-weight:bold; fill:#000; letter-spacing:0.3px; }
    .conn  { stroke:#222; stroke-width:1.6; fill:none; }
    .connD { stroke:#777; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
    .band  { fill:none; stroke:#bbb; stroke-width:1.2; stroke-dasharray:3 4; }
    .dv    { fill:#ffffff; stroke:#222; stroke-width:1.6; }
    .sub   { baseline-shift:sub; font-size:7.3px; }
  </style>

  <text x="215" y="34" text-anchor="middle" class="stage">Data level: CB-HAS hybrid augmentation</text>
  <text x="690" y="34" text-anchor="middle" class="stage">Model level: 1D-CNN-BiLSTM</text>
  <text x="1075" y="34" text-anchor="middle" class="stage">Loss level</text>

  <rect class="band" x="22"  y="48" width="418" height="610" rx="6"/>
  <rect class="band" x="444" y="48" width="480" height="610" rx="6"/>
  <rect class="band" x="940" y="48" width="270" height="610" rx="6"/>

  <!-- ===================== DATA LEVEL ===================== -->

  <ellipse cx="118" cy="86" rx="62" ry="13" fill="#e2e2e2" stroke="#222" stroke-width="1.6"/>
  <path d="M56,86 L56,122 A62,13 0 0 0 180,122 L180,86" class="boxD"/>
  <ellipse cx="118" cy="86" rx="62" ry="13" fill="#e2e2e2" stroke="#222" stroke-width="1.6"/>
  <text x="118" y="107" text-anchor="middle" class="lblXS" font-size="9.5">Original training set</text>
  <line class="conn" x1="118" y1="122" x2="118" y2="138" marker-end="url(#arrow)"/>

  <rect class="box" x="43" y="140" width="150" height="48" rx="4"/>
  <text x="118" y="161" text-anchor="middle" class="lblS">Preprocessing</text>
  <text x="118" y="178" text-anchor="middle" class="lblXS">clean / normalize / encode</text>
  <line class="conn" x1="118" y1="188" x2="118" y2="208" marker-end="url(#arrow)"/>

  <rect class="box" x="43" y="210" width="150" height="42" rx="4"/>
  <text x="118" y="228" text-anchor="middle" class="lblS">Class cardinality</text>
  <text x="118" y="245" text-anchor="middle" class="lblXS">count n<tspan class="sub">k</tspan></text>
  <line class="conn" x1="118" y1="252" x2="118" y2="268" marker-end="url(#arrow)"/>

  <!-- Diamond 1: n_k < tau ? -->
  <polygon class="dv" points="118,270 180,306 118,342 56,306"/>
  <text x="118" y="303" text-anchor="middle" class="lblXS">n<tspan class="sub">k</tspan> &lt; τ ?</text>
  <text x="118" y="318" text-anchor="middle" class="lblXS">(τ = 2,000)</text>

  <!-- Diamond1 -> No-augmentation box -->
  <line class="conn" x1="180" y1="306" x2="248" y2="306" marker-end="url(#arrow)"/>
  <text x="214" y="299" text-anchor="middle" class="lblXS">No</text>

  <rect class="boxF" x="250" y="280" width="160" height="52" rx="4"/>
  <text x="330" y="302" text-anchor="middle" class="lblS" font-weight="bold">No augmentation</text>
  <text x="330" y="319" text-anchor="middle" class="lblXS">(n<tspan class="sub">k</tspan> ≥ τ)</text>

  <!-- Diamond1 -> Diamond2 (Yes) -->
  <line class="conn" x1="118" y1="342" x2="118" y2="388" marker-end="url(#arrow)"/>
  <text x="130" y="369" text-anchor="middle" class="lblXS">Yes</text>

  <!-- Diamond 2: n_k >= tau_s ? -->
  <polygon class="dv" points="118,388 180,424 118,460 56,424"/>
  <text x="118" y="421" text-anchor="middle" class="lblXS">n<tspan class="sub">k</tspan> ≥ τ<tspan class="sub">s</tspan> ?</text>
  <text x="118" y="436" text-anchor="middle" class="lblXS">(τ<tspan class="sub">s</tspan> = 50)</text>

  <!-- Diamond2 -> TVAE box (Yes) -->
  <line class="conn" x1="180" y1="424" x2="248" y2="424" marker-end="url(#arrow)"/>
  <text x="214" y="417" text-anchor="middle" class="lblXS">Yes</text>

  <rect class="box" x="250" y="392" width="160" height="64" rx="4"/>
  <text x="330" y="414" text-anchor="middle" class="lblS" font-weight="bold">TVAE generation</text>
  <text x="330" y="431" text-anchor="middle" class="lblXS">high-fidelity synthesis</text>
  <text x="330" y="447" text-anchor="middle" class="lblXS">(τ<tspan class="sub">s</tspan> ≤ n<tspan class="sub">k</tspan> &lt; τ)</text>

  <!-- Diamond2 -> Interpolation box (No) -->
  <path class="conn" d="M118,460 L118,524 L248,524" marker-end="url(#arrow)"/>
  <text x="130" y="495" text-anchor="middle" class="lblXS">No</text>

  <rect class="box" x="250" y="496" width="160" height="56" rx="4"/>
  <text x="330" y="518" text-anchor="middle" class="lblS" font-weight="bold" font-size="10.5">Random-pair interpolation</text>
  <text x="330" y="537" text-anchor="middle" class="lblXS">(n<tspan class="sub">k</tspan> &lt; τ<tspan class="sub">s</tspan>)</text>

  <!-- Merge: No-augmentation (dashed = pass-through, not generated) -->
  <path class="connD" d="M250,306 L222,306 L222,588 L285,588" marker-end="url(#arrowDash)"/>
  <!-- Merge: TVAE (solid = actively generated) -->
  <path class="conn" d="M410,424 L430,424 L430,588 L375,588" marker-end="url(#arrow)"/>
  <!-- Merge: Interpolation (solid = actively generated) -->
  <line class="conn" x1="330" y1="552" x2="330" y2="576" marker-end="url(#arrow)"/>

  <ellipse cx="330" cy="610" rx="62" ry="34" fill="#cfcfcf" stroke="#222" stroke-width="1.6"/>
  <text x="330" y="605" text-anchor="middle" class="lblXS" font-weight="bold">Augmented</text>
  <text x="330" y="622" text-anchor="middle" class="lblXS">training set D<tspan class="sub">aug</tspan></text>

  <!-- Data level -> Model level -->
  <path class="conn" d="M392,610 L470,610 L470,116 L514,116" marker-end="url(#arrow)"/>

  <!-- ===================== MODEL LEVEL ===================== -->

  <rect class="box" x="516" y="92" width="130" height="48" rx="4"/>
  <text x="581" y="113" text-anchor="middle" class="lblS">Input layer</text>
  <text x="581" y="130" text-anchor="middle" class="lblXS">(78 × 1)</text>

  <rect class="boxF" x="516" y="172" width="130" height="58" rx="4"/>
  <text x="581" y="192" text-anchor="middle" class="lblS">Conv1D-1</text>
  <text x="581" y="208" text-anchor="middle" class="lblXS">64@3 · BN · ReLU</text>
  <text x="581" y="222" text-anchor="middle" class="lblXS">Pool/2 → (39,64)</text>

  <rect class="boxF" x="516" y="258" width="130" height="58" rx="4"/>
  <text x="581" y="278" text-anchor="middle" class="lblS">Conv1D-2</text>
  <text x="581" y="294" text-anchor="middle" class="lblXS">128@3 · BN · ReLU</text>
  <text x="581" y="308" text-anchor="middle" class="lblXS">Pool/2 → (19,128)</text>

  <rect class="box" x="516" y="344" width="130" height="62" rx="4"/>
  <text x="581" y="364" text-anchor="middle" class="lblS">BiLSTM</text>
  <text x="581" y="380" text-anchor="middle" class="lblXS">64 × bidirectional</text>
  <line x1="538" y1="396" x2="624" y2="396" stroke="#333" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="624" y1="401" x2="538" y2="401" stroke="#333" stroke-width="1.1" marker-end="url(#arrow)"/>

  <rect class="boxF" x="516" y="422" width="130" height="32" rx="4"/>
  <text x="581" y="443" text-anchor="middle" class="lblXS">Dropout (p=0.5)</text>

  <rect class="box" x="516" y="470" width="130" height="48" rx="4"/>
  <text x="581" y="490" text-anchor="middle" class="lblS">FC layers</text>
  <text x="581" y="507" text-anchor="middle" class="lblXS">128→64→15</text>

  <line class="conn" x1="581" y1="140" x2="581" y2="170" marker-end="url(#arrow)"/>
  <line class="conn" x1="581" y1="230" x2="581" y2="256" marker-end="url(#arrow)"/>
  <line class="conn" x1="581" y1="316" x2="581" y2="342" marker-end="url(#arrow)"/>
  <line class="conn" x1="581" y1="406" x2="581" y2="420" marker-end="url(#arrow)"/>
  <line class="conn" x1="581" y1="454" x2="581" y2="468" marker-end="url(#arrow)"/>

  <text x="672" y="196" class="lblXS" fill="#888">local</text>
  <text x="672" y="210" class="lblXS" fill="#888">patterns</text>
  <text x="672" y="372" class="lblXS" fill="#888">temporal</text>
  <text x="672" y="386" class="lblXS" fill="#888">dependency</text>

  <path class="conn" d="M646,494 L730,494 L730,116 L1015,116 L1015,150" marker-end="url(#arrow)"/>

  <!-- ===================== LOSS LEVEL ===================== -->

  <rect class="box" x="965" y="150" width="150" height="44" rx="4"/>
  <text x="1040" y="177" text-anchor="middle" class="lblS">Softmax output</text>

  <rect class="box" x="965" y="234" width="150" height="74" rx="4" stroke-width="2.2"/>
  <text x="1040" y="258" text-anchor="middle" class="lblS" font-weight="bold">Cross-entropy (CE)</text>
  <text x="1040" y="278" text-anchor="middle" class="lblXS">L = −log(p<tspan class="sub">t</tspan>)</text>
  <text x="1040" y="295" text-anchor="middle" class="lblXS">final training loss</text>

  <rect x="965" y="338" width="150" height="60" rx="4" fill="#fafafa" stroke="#888" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="1040" y="358" text-anchor="middle" class="lblXS" fill="#555">Focal Loss variants</text>
  <text x="1040" y="374" text-anchor="middle" class="lblXS" fill="#555">(evaluated as controls,</text>
  <text x="1040" y="390" text-anchor="middle" class="lblXS" fill="#555">Sec. 5.5)</text>

  <line class="conn" x1="1040" y1="194" x2="1040" y2="232" marker-end="url(#arrow)"/>
  <line x1="1040" y1="308" x2="1040" y2="336" stroke="#888" stroke-width="1.1" stroke-dasharray="4 3"/>

  <path class="connD" d="M965,272 L790,272 L790,590 L581,590 L581,520" marker-end="url(#arrowDash)"/>
  <text x="800" y="583" class="lblXS" fill="#666">Backpropagation (gradient update)</text>
</svg>
